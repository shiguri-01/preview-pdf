name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test release candidate (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test

  build-release-assets:
    name: Build release asset (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact-name: pvf-linux-x86_64
            binary-path: target/release/pvf
            archive-name: pvf-linux-x86_64.tar.gz
          - os: macos-14
            artifact-name: pvf-macos-arm64
            binary-path: target/release/pvf
            archive-name: pvf-macos-arm64.tar.gz
          - os: windows-2022
            artifact-name: pvf-windows-x86_64
            binary-path: target/release/pvf.exe
            archive-name: pvf-windows-x86_64.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.binary-path }}" pvf
          tar -czf "dist/${{ matrix.archive-name }}" pvf LICENSE README.md

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path @("${{ matrix.binary-path }}", "LICENSE", "README.md") -DestinationPath "dist/${{ matrix.archive-name }}"

      - name: Generate checksum
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd dist
          shasum -a 256 "${{ matrix.archive-name }}" > "${{ matrix.archive-name }}.sha256"

      - name: Generate checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 "dist/${{ matrix.archive-name }}").Hash.ToLower()
          "$hash  ${{ matrix.archive-name }}" | Out-File -FilePath "dist/${{ matrix.archive-name }}.sha256" -Encoding ascii

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            dist/${{ matrix.archive-name }}
            dist/${{ matrix.archive-name }}.sha256
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-release-assets
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/**/*
